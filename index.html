<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Chat Hub | Project 3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>

    <div class="hub-container">
        <header class="hub-header">
            <div class="header-left">
                <div class="logo-section">
                    <h1>Neural Chat</h1>
                    <p>ENCRYPTED COMMS CHANNEL . V1.2</p>
                </div>
                <div class="relay-status" id="relayStatus">
                    <span class="status-dot"></span>
                    Relay: Standby
                </div>
            </div>
            <div class="system-time" id="clock">00:00:00</div>
        </header>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="chat-watermark">Chatbox</div>
            </div>
            <div class="chat-input-area">
                <div class="input-row">
                    <div class="meeting-label">Meeting URL:</div>
                    <input type="text" id="chatInput" placeholder="https://meet.google.com/..." aria-label="Meeting URL">
                </div>
                
                <div class="control-row">
                    <select class="neural-select" id="languageSelect">
                        <!-- Options populated by JS -->
                    </select>
                    
                    <button class="send-btn" id="sendBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8l6 6 6-6"></path><path d="M2 18h20"></path></svg>
                        Translate
                    </button>
                </div>

                <div class="status-controls">
                    <button class="icon-btn" id="micBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>
                    <button class="icon-btn" id="speakerBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/languages.js"></script>
    <script src="js/relay.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
